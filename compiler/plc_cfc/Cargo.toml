[package]
name = "plc_cfc"
version = "0.1.0"
edition = "2024"

[dependencies]
# the ST parser: POU declarations (textDeclaration) and DataSource/DataSink expressions
plc = { path = "../..", package = "plc-compiler", version = "1.1.0-dev" }
ast = { path = "../plc_ast", package = "plc_ast", version = "1.1.0-dev" }
plc_source = { path = "../plc_source", version = "1.1.0-dev" }
plc_diagnostics = { path = "../plc_diagnostics", version = "1.1.0-dev" }
serde.workspace = true
# `serialize`: serde support; `serde-types`: tagged-enum helpers (xsi:type dispatch);
# `overlapped-lists`: interleaved <CommonObject>/<FbdObject> siblings within a network
quick-xml = { version = "0.38", features = ["serialize", "serde-types", "overlapped-lists"] }

[dev-dependencies]
insta.workspace = true
