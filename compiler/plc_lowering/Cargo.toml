[package]
name = "plc_lowering"
version = "0.3.1"
edition = "2021"
license = "LGPL-3.0"
description = "AST lowering passes for the PLC Structured Text compiler"

[dependencies]
plc = { path = "../..", package = "plc-compiler", version = "0.3.1" }
