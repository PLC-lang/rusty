import lit.formats, os, os.path, sys, subprocess, shutil
srcDir = os.path.dirname(__file__)

# Ensure the util/ directory is on PATH so that our fallback 'not' script is
# found when LLVM's own 'not' utility is not installed.  If the real 'not' is
# already on PATH it will shadow our script (PATH is searched left-to-right),
# so we append rather than prepend here.
_util_dir = os.path.join(srcDir, 'util')
config.environment['PATH'] = os.environ.get('PATH', '') + os.pathsep + _util_dir
config.test_format = lit.formats.ShTest(True)
config.pipefail = False
rustyRootDirectory = subprocess.check_output("dirname `cargo locate-project --message-format plain`", shell=True).decode("utf-8").strip()

stdlibLocation = lit_config.params["LIB"]
compilerLocation = lit_config.params["COMPILER"]

# Optimization level passed to plc when compiling test STs. Default ("default")
# mirrors how plc itself runs without an explicit `-O`. The matrix run also
# exercises OPT_LEVEL=none, which surfaces broken IR LLVM's optimizer would
# otherwise mask. See #1345 (`tests/lit/single/init/function_locals.st` is the
# named example of code that passes the default cell but segfaults under
# `-Onone`).
optLevel = lit_config.params.get("OPT_LEVEL", "default")

# Detect available FileCheck command
filecheckCmd = None
for cmd in ['FileCheck', 'FileCheck-21', 'filecheck', 'filecheck-21']:
    if shutil.which(cmd):
        filecheckCmd = cmd
        break

if not filecheckCmd:
    lit_config.fatal("No FileCheck command found. Please install LLVM FileCheck.")

lit_config.note(f'Using FileCheck command: {filecheckCmd}')

# ...to make the compile command more readable we build it over multiple lines
compile_base = f'{compilerLocation}'
compile_base = f'{compile_base} -liec61131std -L{stdlibLocation}/lib -i "{stdlibLocation}/include/*.st"'
compile_base = f'{compile_base} -i "{rustyRootDirectory}/tests/lit/util/*.pli"'
compile_base = f'{compile_base} --debug'
compile_base = f'{compile_base} --linker=cc'
compile_base = f'{compile_base} --error-config {rustyRootDirectory}/tests/lit/util/diagnostics.json'

# Inject `-O` only when the matrix cell is not the default. plc rejects a
# duplicate `-O` (clap), so omitting it at the default level lets tests opt
# in via their own RUN line if they truly need a fixed level.
if optLevel != "default":
    compile_base = f'{compile_base} -O{optLevel}'

compile = f'{compile_base} -o %T/%basename_t.out'
print(f'Compile command: {compile}')

# compile_ir outputs to stdout (-o -) for tests that check IR output
compile_ir = f'{compilerLocation}'
compile_ir = f'{compile_ir} --ir --debug'
compile_ir = f'{compile_ir} -o -'
compile_ir = f'{compile_ir} -liec61131std -L{stdlibLocation}/lib -i "{stdlibLocation}/include/*.st"'
compile_ir = f'{compile_ir} -i "{rustyRootDirectory}/tests/lit/util/*.pli"'
if optLevel != "default":
    compile_ir = f'{compile_ir} -O{optLevel}'

stdlibLibDir = f'{stdlibLocation}/lib'

config.substitutions.append(('%COMPILE_IR', f'{compile_ir}'))
config.substitutions.append(('%COMPILE', f'{compile}'))
config.substitutions.append(('%PLC', compilerLocation))
config.substitutions.append(('%STDLIBDIR', stdlibLibDir))
config.substitutions.append(('%RUN', f'LD_LIBRARY_PATH="{stdlibLibDir}" %T/%basename_t.out'))
config.substitutions.append(('%CHECK_IR', f'{filecheckCmd} --check-prefixes CHECK --allow-unused-prefixes'))
config.substitutions.append(('%CHECK', f'{filecheckCmd} --check-prefixes CHECK --allow-unused-prefixes --match-full-lines'))

# Platform features for REQUIRES:/UNSUPPORTED: guards
import platform
if platform.system() == 'Linux':
    config.available_features.add('system-linux')
elif platform.system() == 'Darwin':
    config.available_features.add('system-darwin')
elif platform.system() == 'Windows':
    config.available_features.add('system-windows')

# Optimization-level features for REQUIRES:/UNSUPPORTED: guards. A test that
# fails (segfaults, miscompiles, etc.) under `-Onone` should mark itself
# `// UNSUPPORTED: opt-none` until the underlying bug is addressed.
if optLevel == "none":
    config.available_features.add('opt-none')

