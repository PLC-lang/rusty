import os.path
import subprocess
import tempfile

stdlibLocation = lit_config.params["LIB"]
compilerLocation = lit_config.params["COMPILER"]

test_dir = os.path.dirname(__file__)
source_path = os.path.abspath(test_dir)
rustyRootDirectory = os.path.abspath(os.path.join(test_dir, "..", "..", "..", ".."))

tmp_path = tempfile.mkdtemp(prefix="extern_fb_array_ctor_wiring_")
obj_prefix = "extern_fb_array_ctor_wiring"

# Step 1: Compile fb_body.c into an object file
fb_body_obj = os.path.join(tmp_path, f"{obj_prefix}.fb_body.o")
try:
    gcc_cmd = f"gcc -c -o {fb_body_obj} {source_path}/fb_body.c"
    lit_config.note(f"Running: {gcc_cmd}")
    subprocess.run(gcc_cmd, shell=True, check=True,
                   stdout=subprocess.PIPE, stderr=subprocess.PIPE)
except subprocess.CalledProcessError as e:
    lit_config.error(f"Failed to compile fb_body.c: {e.stderr.decode()}")
    raise

# Step 2: Compile the ctor-only object from the header
fb_ctors_obj = os.path.join(tmp_path, f"{obj_prefix}.fb_ctors.o")
try:
    ctor_cmd = (
        f"{compilerLocation}"
        f" -i \"{stdlibLocation}/include/*.st\""
        f" -i \"{rustyRootDirectory}/tests/lit/util/*.pli\""
        f" -i {source_path}/header.pli"
        f" --constructors-only --relocatable"
        f" -o {fb_ctors_obj}"
    )
    lit_config.note(f"Running: {ctor_cmd}")
    subprocess.run(ctor_cmd, shell=True, check=True,
                   stdout=subprocess.PIPE, stderr=subprocess.PIPE)
except subprocess.CalledProcessError as e:
    lit_config.error(f"Failed to compile ctors: {e.stderr.decode()}")
    raise

# Step 3: Compile main.st linking the ctor object and C body
compile = f'{compilerLocation}'
compile = f'{compile} -o %T/%basename_t.out'
compile = f'{compile} -liec61131std -L{stdlibLocation}/lib -i "{stdlibLocation}/include/*.st"'
compile = f'{compile} -i "{rustyRootDirectory}/tests/lit/util/*.pli"'
compile = f'{compile} -i {source_path}/header.pli'
compile = f'{compile} --debug --linker=cc'
compile = f'{compile} {fb_body_obj} {fb_ctors_obj}'

run_cmd = f'LD_LIBRARY_PATH="{stdlibLocation}/lib" %T/%basename_t.out'

config.substitutions = [s for s in config.substitutions if s[0] not in ['%COMPILE', '%RUN']]
config.substitutions.append(('%COMPILE', f'{compile}'))
config.substitutions.append(('%RUN', f'{run_cmd}'))
