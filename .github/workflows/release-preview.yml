name: Release Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - master

jobs:
  preview:
    name: Preview release notes
    if: >-
      github.event.pull_request.merged == false
      && github.event.pull_request.head.ref == 'release/next'
      && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine previous release tag
        id: previous-tag
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -n1 || true)
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes workspace
        run: mkdir -p .github/release

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --tag "${{ steps.version.outputs.tag }}" --strip header
        env:
          OUTPUT: .github/release/raw-notes.md

      - name: Compose release notes
        run: |
          bash .github/scripts/compose-release-notes.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.tag }}" \
            "${{ steps.previous-tag.outputs.tag }}" \
            .github/release/raw-notes.md \
            .github/release/release-notes.md

      - name: Comment release preview
        uses: actions/github-script@v9
        env:
          RELEASE_TITLE: RuSTy PLC Compiler ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ steps.previous-tag.outputs.tag }}
          RELEASE_NOTES_PATH: .github/release/release-notes.md
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- release-preview -->';
            const releaseNotes = fs.readFileSync(process.env.RELEASE_NOTES_PATH, 'utf8').trim();
            const previousTag = process.env.PREVIOUS_TAG
              ? `\`${process.env.PREVIOUS_TAG}\``
              : '_none_';
            const version = process.env.RELEASE_VERSION;
            const assetNames = [
              'plc-linux-x86_64',
              'plc-linux-aarch64',
              'plc.exe',
              `plc-compiler_${version}-1_amd64.deb`,
              `plc-compiler_${version}-1_arm64.deb`,
              `plc-stdlib_${version}-1_amd64.deb`,
              `plc-stdlib_${version}-1_arm64.deb`,
              `stdlib-${version}.tar.gz`,
              'iec61131std.dll',
              'iec61131std.lib',
            ];
            const body = [
              marker,
              '### Release Preview',
              '',
              'This is the GitHub release that would be published if this PR were merged now.',
              '',
              `- Title: \`${process.env.RELEASE_TITLE}\``,
              `- Tag: \`${process.env.RELEASE_TAG}\``,
              `- Previous tag: ${previousTag}`,
              '',
              '<details>',
              '<summary>Rendered release</summary>',
              '',
              `# ${process.env.RELEASE_TITLE}`,
              '',
              releaseNotes,
              '',
              '</details>',
              '',
              '<details>',
              '<summary>Expected release assets</summary>',
              '',
              'Assets are uploaded asynchronously from the post-merge `Build Linux` and `Build Windows` runs on `master`.',
              '',
              ...assetNames.map(name => `- \`${name}\``),
              '',
              '_Linux packages prefer the native build for each target architecture._',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
