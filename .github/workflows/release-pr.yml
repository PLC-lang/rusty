---
name: Release PR

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Skip if the push is a release PR merge; always run for manual triggers
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'chore(release):')
       && !startsWith(github.event.head_commit.message, 'chore: bump version to'))
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked --version 0.13.9

      - name: Determine next version
        id: cliff-version
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version

      - name: Check if bump needed
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NEXT=$(echo "${{ steps.cliff-version.outputs.content }}" | sed 's/^v//')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ -z "$NEXT" ] || [ "$NEXT" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        if: steps.version.outputs.skip == 'false'
        run: cargo set-version --workspace ${{ steps.version.outputs.next }}

      - name: Update Cargo.lock
        if: steps.version.outputs.skip == 'false'
        run: cargo generate-lockfile

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --tag "v${{ steps.version.outputs.next }}"
        env:
          OUTPUT: CHANGELOG.md

      - name: Create pull request
        if: steps.version.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(release): prepare v${{ steps.version.outputs.next }}"
          branch: release/next
          delete-branch: true
          title: "chore(release): v${{ steps.version.outputs.next }}"
          body: |
            ## Release v${{ steps.version.outputs.next }}

            Bumps all workspace packages from v${{ steps.version.outputs.current }} → v${{ steps.version.outputs.next }}.

            Review the updated `CHANGELOG.md` for a full list of changes.

            ---
            _Merge this PR to trigger tagging and GitHub release creation._
          labels: release
