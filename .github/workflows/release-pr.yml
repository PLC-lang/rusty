---
name: Release PR

on:
  push:
    branches:
      - master
      # Maintenance branches for released versions, e.g. release/1.0.x. The
      # character class keeps the automation's own `release/next*` head
      # branches from matching.
      - "release/[0-9]*"
  workflow_dispatch:

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Skip if the push is a release PR merge; always run for manual triggers
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'chore(release):')
       && !startsWith(github.event.head_commit.message, 'chore: bump version to'))
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked --version 0.13.9

      - name: Determine next version
        id: cliff-version
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version

      - name: Derive branch names
        id: branches
        run: |
          # Each base branch gets its own release-PR head branch so that a
          # master release PR and a maintenance release PR can coexist.
          BASE="${GITHUB_REF_NAME}"
          if [ "$BASE" = "master" ]; then
            HEAD="release/next"
          else
            HEAD="release/next-${BASE#release/}"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: Check if bump needed
        id: version
        run: |
          # `release.yml` opens a post-release PR that preemptively bumps the
          # workspace to `<patch+1>-dev` after every release, so master visibly
          # diverges from the released tag. After that PR merges, this workflow
          # must NOT fire until a real fix/feat lands — but git-cliff returns
          # the last tag's version (e.g. `0.5.0`) which is *less than* CURRENT
          # (`0.5.1-dev`), so a naive equality check would try to downgrade
          # and break (#1690). Strip the `-dev` suffix before comparing, and
          # explicitly handle the "drop -dev to release" case where cliff
          # agrees with the version we'd preemptively bumped to.
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NEXT=$(echo "${{ steps.cliff-version.outputs.content }}" | sed 's/^v//')

          # Maintenance branches (release/X.Y.x) only ever publish patch
          # releases; minting a minor/major there would collide with the tags
          # master produces. The PR guard rejects feat/breaking backports up
          # front — this clamp is the backstop for anything that slips
          # through (e.g. a non-squash merge).
          if [ "${GITHUB_REF_NAME}" != "master" ] && [ -n "$NEXT" ]; then
            BASE_TAG=$(git tag --list 'v[0-9]*' --merged HEAD --sort=-v:refname | head -n1)
            BASE_VERSION="${BASE_TAG#v}"
            if [ -n "$BASE_VERSION" ] && [ "${NEXT%.*}" != "${BASE_VERSION%.*}" ]; then
              CLAMPED="${BASE_VERSION%.*}.$(( ${BASE_VERSION##*.} + 1 ))"
              echo "::warning::git-cliff computed v$NEXT on ${GITHUB_REF_NAME}; clamping to patch release v$CLAMPED"
              NEXT="$CLAMPED"
            fi
          fi

          CURRENT_BASE="${CURRENT%-dev}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ -z "$NEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n%s\n' "$CURRENT_BASE" "$NEXT" | sort -V -C \
               && [ "$NEXT" != "$CURRENT_BASE" ]; then
            # NEXT > CURRENT_BASE: real upgrade (overwrites any -dev).
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$NEXT" = "$CURRENT_BASE" ] && [ "$CURRENT" != "$CURRENT_BASE" ]; then
            # Master is at <NEXT>-dev and cliff agrees the next release is
            # <NEXT>: drop the -dev suffix, open a release PR.
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            # NEXT < CURRENT_BASE, or NEXT == CURRENT with no -dev to drop:
            # nothing warranted yet.
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        if: steps.version.outputs.skip == 'false'
        run: cargo set-version --workspace ${{ steps.version.outputs.next }}

      - name: Update Cargo.lock
        if: steps.version.outputs.skip == 'false'
        run: cargo generate-lockfile

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --tag "v${{ steps.version.outputs.next }}"
        env:
          OUTPUT: CHANGELOG.md

      - name: Create pull request
        if: steps.version.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(release): prepare v${{ steps.version.outputs.next }}"
          branch: ${{ steps.branches.outputs.head }}
          base: ${{ steps.branches.outputs.base }}
          delete-branch: true
          title: "chore(release): v${{ steps.version.outputs.next }}"
          body: |
            ## Release v${{ steps.version.outputs.next }}

            Bumps all workspace packages from v${{ steps.version.outputs.current }} → v${{ steps.version.outputs.next }}.

            Review the updated `CHANGELOG.md` for a full list of changes.

            ---
            _Merge this PR to trigger tagging and GitHub release creation._
          labels: release
