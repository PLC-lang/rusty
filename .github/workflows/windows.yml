name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Windows Build
    runs-on: windows-2022
    steps:

      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: Install LLVM
        shell: pwsh
        run: |
          $llvmUrl = "https://github.com/PLC-lang/llvm-package-windows/releases/download/v21.1.7/LLVM-21.1.7-win64.7z"
          $llvmArchive = "LLVM-21.1.7-win64.7z"
          Invoke-WebRequest -Uri $llvmUrl -OutFile $llvmArchive
          7z x $llvmArchive -o"./llvm" -y
          $llvmBin = (Resolve-Path "./llvm/bin").Path
          echo "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cargo test (Unit)
        run: cargo test --lib -- --nocapture

      - name: Cargo test (Correctness)
        run: cargo test correctness -- --nocapture --test-threads=1

      - name: Cargo test (Integration)
        run: cargo test integration -- --nocapture --test-threads=1

      - name: Release Build
        run: cargo build --release --workspace

      - uses: actions/upload-artifact@v7
        with:
          name: plc.exe
          path: target/release/plc.exe

      - uses: actions/upload-artifact@v7
        with:
          name: stdlib.dll
          path: target/release/iec61131std.dll

      - uses: actions/upload-artifact@v7
        with:
          name: stdlib.lib
          path: target/release/iec61131std.lib

  pr-artifacts:
    name: PR Artifacts
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const lines = artifacts.artifacts
              .map(a => `| \`${a.name}\` | [Download](${runUrl}/artifacts/${a.id}) | ${(a.size_in_bytes / 1024 / 1024).toFixed(1)} MB |`);

            const body = [
              '### :window: Windows Build Artifacts',
              '| Artifact | Link | Size |',
              '|----------|------|------|',
              ...lines,
              '',
              `_From [workflow run #${context.runId}](${runUrl})_`,
            ].join('\n');

            const marker = '<!-- pr-artifacts-windows -->';
            const fullBody = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
