name: Release PR

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release-plz-pr:
    name: Update release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect GitHub App credentials
        id: app-creds
        run: echo "enabled=${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        if: ${{ steps.app-creds.outputs.enabled == 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.3
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.token }}
